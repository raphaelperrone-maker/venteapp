<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllinOne — Hors ligne</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1e2130;
    border: 1px solid #2a2f42;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 4rem; margin-bottom: 20px; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
  p { font-size: .9rem; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
  .badge {
    display: inline-block;
    background: #7f1d1d33;
    border: 1px solid #ef4444;
    color: #ef4444;
    border-radius: 999px;
    padding: 4px 14px;
    font-size: .78rem;
    font-weight: 600;
    margin-bottom: 24px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #4ade80;
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .hint {
    margin-top: 20px;
    font-size: .75rem;
    color: #64748b;
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #ef4444;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:.3; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <div class="badge"><span class="dot"></span>Hors ligne</div>
  <h1>Connexion indisponible</h1>
  <p>L'application AllinOne ne peut pas atteindre le serveur.<br>Vérifie ta connexion internet et réessaie.</p>
  <button class="btn" onclick="tenterReconnexion()">🔄 Réessayer</button>
  <p class="hint">Tes données sont en sécurité — elles seront synchronisées à la reconnexion.</p>
</div>

<script>
function tenterReconnexion() {
  const btn = document.querySelector('.btn');
  btn.textContent = '⏳ Vérification…';
  btn.disabled = true;
  // Tester la connexion vers Vercel
  fetch('https://allinone-server.vercel.app/api/verify', { method: 'GET' })
    .then(() => { window.location.href = '/venteapp/'; })
    .catch(() => {
      btn.textContent = '🔄 Réessayer';
      btn.disabled = false;
      // Secouer la carte pour signaler l'échec
      document.querySelector('.card').style.animation = 'none';
      setTimeout(() => {
        document.querySelector('.badge').textContent = '⚠️ Toujours hors ligne';
        btn.textContent = '🔄 Réessayer';
        btn.disabled = false;
      }, 500);
    });
}

// Écouter le retour de connexion
window.addEventListener('online', () => {
  setTimeout(() => window.location.href = '/venteapp/', 1000);
});
</script>
</body>
</html>
